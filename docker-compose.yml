services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: guardian_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Kafka (KRaft mode)
  kafka:
    image: bitnami/kafka:3.6
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  # 3. FastAPI AI Sidecar
  inference-sidecar:
    build: ./inference_sidecar
    environment:
      MODEL_PATH: /app/models/qwen2.5-1.5b-schema-guardian.gguf
    ports:
      - "8000:8000"
    volumes:
      - ./inference_sidecar/models:/app/models # Mount local models dir
    depends_on:
      - kafka

  # 4. Spring Boot Backend
  backend:
    build: ./backend
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres
      POSTGRES_DB: guardian_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SIDECAR_URL: http://inference-sidecar:8000/validate
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      inference-sidecar:
        condition: service_started
    ports:
      - "8080:8080"
